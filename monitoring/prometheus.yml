# Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: 'agent-api'
    metrics_path: '/api/monitoring/metrics'
    static_configs:
      - targets: ['api:3001']
    scrape_interval: 10s

  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']

  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb_exporter:9216']

# Alert rules
---
groups:
  - name: agent_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(agent_tasks_failed_total[5m]) / rate(agent_tasks_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Agent error rate > 5%"
          description: "Agent system has > 5% error rate for 5 minutes"

      - alert: AgentDown
        expr: up{job="agent-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Agent API is down"
          description: "Agent API server has been down for more than 1 minute"

      - alert: HighResponseTime
        expr: agent_response_time_ms > 2000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time"
          description: "Agent API response time > 2s for 5 minutes"
