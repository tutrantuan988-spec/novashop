    <!-- Google Tag Manager (chỉ load khi có GTM_ID) -->
    <script>
      (function() {

        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtm.js?id=' + gtmId;

        window.dataLayer = window.dataLayer || [];

    <!-- Google Analytics 4 (fallback nếu không có GTM, chỉ load khi có GA_ID) -->
    <script>
      (function() {
        var gaId = '%VITE_GA_ID%';
        if (!gaId || gaId === 'G-XXXXXXXXXX') return;
        // Nếu đã có GTM thì không cần load GA riêng
        if ('%VITE_GTM_ID%' && '%VITE_GTM_ID%' !== 'GTM-XXXXXXX' && '%VITE_GTM_ID%' !== 'G-XXXXXXXXXX') return;
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', gaId);
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + gaId;
        document.head.appendChild(s);
      })();
    </script>

        'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', pixelId);

    </script>

    <!-- Tawk.to Live Chat (chỉ load khi có TAWKTO_ID) -->

    <!-- Zalo Official Account Chat Widget (chỉ hiển thị khi có ZALO_OA_ID) -->
    <!-- Lấy iframe code từ: https://oa.zalo.me/ → Cài đặt → Widget Chat -->
    <div id="zalo-chat-widget" style="display:none"></div>
    <script>
      (function() {
        var zaloId = '%VITE_ZALO_OA_ID%';
        if (!zaloId || zaloId === '0000000000000000000') return;
        
        // Tạo iframe Zalo OA chat
        var iframe = document.createElement('iframe');
        iframe.src = 'https://oa.zalo.me/' + zaloId + '/chat?type=widget&theme=green&size=large&position=bottom-right';
        iframe.style.cssText = 'position:fixed;bottom:100px;right:20px;width:350px;height:500px;border:none;z-index:9999;display:none;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.18);overflow:hidden';
        iframe.id = 'zalo-oa-iframe';
        iframe.title = 'Chat với Zalo OA';
        iframe.allow = 'clipboard-read; clipboard-write';
        
        // Tạo nút toggle chat
        var btn = document.createElement('div');
        btn.style.cssText = 'position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;background:#0068ff;cursor:pointer;z-index:9998;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,104,255,0.35);transition:transform 0.2s';
        btn.innerHTML = '<svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.88.54 3.64 1.48 5.13L2 22l5.13-1.48C8.36 21.46 10.12 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg>';
        btn.id = 'zalo-oa-btn';
        btn.title = 'Chat với chúng tôi qua Zalo';
        
        // Hover effect
        btn.onmouseenter = function() { this.style.transform = 'scale(1.1)'; };
        btn.onmouseleave = function() { this.style.transform = 'scale(1)'; };
        
        // Toggle chat on click
        var isOpen = false;
        btn.onclick = function() {
          isOpen = !isOpen;
          iframe.style.display = isOpen ? 'block' : 'none';
          btn.style.transform = isOpen ? 'rotate(45deg)' : 'scale(1)';
        };
        
        document.body.appendChild(btn);
        document.body.appendChild(iframe);
      })();
    </script>

    <!-- PageAgent AI Copilot (chỉ load khi có LLM config) -->

        var hasLLM = ('%VITE_OPENAI_API_KEY%' && '%VITE_OPENAI_API_KEY%' !== 'sk-xxx') ||

        // Nếu tắt AI hoặc không có LLM config → không load PageAgent
        if ('%VITE_DISABLE_AI_COPILOT%' === 'true' || !hasLLM) return;
        
        var s = document.createElement('script');
