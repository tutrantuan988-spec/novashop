[build]
cmd = "npm install"

[deploy]
startCommand = "node server/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[environments.production]
numReplicas = 1

[environments.production.deploy]
startCommand = "node server/index.js"
